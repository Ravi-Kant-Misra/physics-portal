<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Physics Foundations by Ravi</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a5f);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white;}
    .box{text-align:center;padding:48px 32px;max-width:420px;}
    .icon{font-size:2.5rem;margin-bottom:16px;}
    h1{font-size:1.5rem;font-weight:900;margin-bottom:8px;}
    p{color:rgba(255,255,255,.6);font-size:.9rem;margin-bottom:28px;line-height:1.7;}
    .spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    a{color:#93c5fd;font-weight:700;font-size:.85rem;}
  </style>
  <!-- Admin: same deployment as student portal, mode=admin parameter routes to dashboard -->
  <meta http-equiv="refresh" content="0;url=https://script.google.com/macros/s/AKfycbwc0-62SrefMlpwxJtBXZN1ud4clOT0CC9wSgzndq4n6XC2z-5HrlE_idQ6OhSv1WxJsQ/exec?mode=admin">
</head>
<body>
  <div class="box">
    <div class="icon">⚛️</div>
    <h1>Admin Dashboard</h1>
    <p>Physics Foundations by Ravi</p>
    <div class="spinner"></div>
    <p>Redirecting to admin panel...<br><br>
    <a href="https://script.google.com/macros/s/AKfycbwc0-62SrefMlpwxJtBXZN1ud4clOT0CC9wSgzndq4n6XC2z-5HrlE_idQ6OhSv1WxJsQ/exec?mode=admin">Click here if not redirected →</a></p>
  </div>
  <script>
    window.location.replace("https://script.google.com/macros/s/AKfycbwc0-62SrefMlpwxJtBXZN1ud4clOT0CC9wSgzndq4n6XC2z-5HrlE_idQ6OhSv1WxJsQ/exec?mode=admin");
  </script>
</body>
</html>
